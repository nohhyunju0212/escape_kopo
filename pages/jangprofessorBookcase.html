<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>장교수님 방탈출 책꽂이</title>
    <link rel="stylesheet" href="../css/jangprofessor.css" />
  </head>
  <body>
    <div class="stage">
      <div class="play-area">
        <!-- 인벤토리만 이미지 바깥 왼쪽 -->
        <div id="inventory">
          <div class="inv-label">아이템</div>
          <div class="inv-divider"></div>
          <div class="inv-grid" id="inv-grid"></div>
        </div>

        <!-- 이미지 기준 박스 -->
        <div class="scene-wrap">
          <img
            src="../images/labBookcase.png"
            alt="장석주 교수님 연구실 책꽂이"
            class="scene-image"
          />

          <!-- 책꽂이 / 서버키 -->
          <div
            class="hotspot"
            style="left: 37%; top: 0%; width: 25%; height: 90%;"
            onclick="openItem('severKey')"
          ></div>

          <!-- 선반 -->
          <div
            class="hotspot"
            style="left: 60%; top: 45%; width: 17%; height: 40%;"
            onclick="openItem('Shelf')"
          ></div>

          <!-- 라커 -->
          <div
            class="hotspot"
            style="left: 80%; top: 10%; width: 7%; height: 71%;"
            onclick="openItem('locker')"
          ></div>

          <!-- 왼쪽 상단 HUD -->
          <div id="hud-topleft">
            <div id="loc-badge">
              <span class="pdot"></span>📍 장석주 교수님 연구실
            </div>
            <div id="guide-msg">🔍 공간을 조사해 단서를 찾아보자</div>
          </div>

          <!-- 오른쪽 상단 MAP -->
          <!-- 오른쪽 상단 뒤로가기 -->
          <div id="hud-topright">
            <button id="top-back" onclick="goMain()">↩ 뒤로가기</button>
          </div>

          <!-- 오른쪽 하단 탈출 -->
          <button id="btn-escape" onclick="openEsc()">🚪 탈출</button>
        </div>
      </div>
    </div>

    <!-- 아이템 팝업 -->
    <div id="popup">
      <div class="pbox">
        <div id="p-icon"></div>
        <div id="p-title"></div>
        <div id="p-desc"></div>
        <div class="pbtns">
          <button class="btn btn-take" onclick="takeItem()">획득</button>
          <button class="btn btn-close" onclick="closePopup()">닫기</button>
        </div>
      </div>
    </div>

    <!-- 탈출 팝업 -->
    <div id="popup-esc">
      <div class="ebox">
        <h2>🔐 탈출</h2>
        <p class="ebox-sub">
          문에 자물쇠가 걸려 있다.<br />
          4자리 비밀번호를 입력해야 탈출할 수 있다.
        </p>
        <div class="pw-row">
          <input
            class="pw-box"
            id="p0"
            maxlength="1"
            oninput="pi(0)"
            onkeydown="pk(event, 0)"
          />
          <input
            class="pw-box"
            id="p1"
            maxlength="1"
            oninput="pi(1)"
            onkeydown="pk(event, 1)"
          />
          <input
            class="pw-box"
            id="p2"
            maxlength="1"
            oninput="pi(2)"
            onkeydown="pk(event, 2)"
          />
          <input
            class="pw-box"
            id="p3"
            maxlength="1"
            oninput="pi(3)"
            onkeydown="pk(event, 3)"
          />
        </div>
        <div id="pw-msg"></div>
        <div class="ebtns">
          <button class="btn-go" onclick="tryEscape()">탈출한다</button>
          <button class="btn-back" onclick="closeEsc()">취소</button>
        </div>
      </div>
    </div>

    <!-- 탈출 성공 화면 -->
    <div id="popup-success">
      <div class="success-box">
        <div class="success-emoji">🎉</div>
        <div class="success-title">탈출 성공!</div>
        <div class="success-sub">
          비밀번호가 맞습니다.<br />
          폴리텍에서 탈출 성공했다!
        </div>
        <button class="btn-restart" onclick="location.reload()">
          다시 시작
        </button>
      </div>
    </div>

    <div id="toast"></div>

    <script src="../js/common_inventory.js"></script>
    <script src="../js/common_sound.js"></script>
    <script src="../js/jangprofessor.js"></script>  
  </body>
</html>
