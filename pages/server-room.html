<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kopo 탈출 게임 - 서버실 내부</title>
  <link rel="stylesheet" href="../css/lounge.css" />
</head>
<body>
  <div class="stage">
    <div class="play-area">
      <div id="inventory">
        <div class="inv-label">아이템</div>
        <div class="inv-divider"></div>
        <div class="inv-grid" id="inv-grid"></div>
      </div>

      <div class="scene-wrap">
        <img src="../images/server-room.jpg" alt="서버실" class="scene-image" />

        <div class="hotspot cooler-on" id="cooler-hotspot"
             style="left:57%; top:34%; width:5%; height:5%;"
             onclick="cool()" title="쿨러"></div>

        <div class="hotspot"
             style="left:29%; top:30%; width:5%; height:8%;"
             onclick="openImagePopup('../images/sticker.jpg')" title="스티커"></div>

        <div id="hud-topleft">
          <div id="loc-badge">
            <span class="pdot"></span>📍 서버실
          </div>
          <div id="guide-msg">🔍 서버실에서 무언가 단서를 찾아보자</div>
        </div>

        <div id="hud-topright">
          <button id="map-toggle" onclick="toggleMap()">🗺 MAP</button>
          <div id="map-panel">
            <h3>🗺 MAP — 이동하기</h3>

            <div class="mroom" onclick="goRoom('강의실')">
              <div class="mdot"></div>강의실<span class="mtag">→</span>
            </div>

            <div class="mroom" onclick="goRoom('장석주 교수님 연구실')">
              <div class="mdot"></div>장석주 교수님 연구실<span class="mtag">→</span>
            </div>

            <div class="mroom" onclick="goRoom('정원치 교수님 연구실')">
              <div class="mdot"></div>정원치 교수님 연구실<span class="mtag">→</span>
            </div>

            <div class="mroom" onclick="goRoom('라운지')">
              <div class="mdot"></div>라운지<span class="mtag">→</span>
            </div>

            <div class="mroom here">
              <div class="mdot"></div>서버실<span class="mtag">현재</span>
            </div>
          </div>
        </div>

        <button id="btn-escape" onclick="openEsc()">🚪 탈출</button>
      </div>
    </div>
  </div>

  <div id="image-popup">
    <div class="image-popup-backdrop" onclick="closeImagePopup(event)">
      <div class="image-popup-box">
        <img id="popup-image" src="" alt="확대 이미지" />
        <button class="image-popup-close" onclick="closeImagePopup()">닫기</button>
      </div>
    </div>
  </div>

  <div id="popup">
    <div class="pbox">
      <div id="p-icon"></div>
      <div id="p-title"></div>
      <div id="p-desc"></div>
      <div class="pbtns">
        <button class="btn btn-take" onclick="takeItem()">획득</button>
        <button class="btn btn-close" onclick="closePopup()">닫기</button>
      </div>
    </div>
  </div>

  <div id="popup-esc">
    <div class="ebox">
      <h2>🔐 탈출</h2>
      <p class="ebox-sub">
        문에 자물쇠가 걸려 있다.<br />
        4자리 비밀번호를 입력해야 탈출할 수 있다.
      </p>
      <div class="pw-row">
        <input class="pw-box" id="p0" maxlength="1" oninput="pi(0)" onkeydown="pk(event,0)" />
        <input class="pw-box" id="p1" maxlength="1" oninput="pi(1)" onkeydown="pk(event,1)" />
        <input class="pw-box" id="p2" maxlength="1" oninput="pi(2)" onkeydown="pk(event,2)" />
        <input class="pw-box" id="p3" maxlength="1" oninput="pi(3)" onkeydown="pk(event,3)" />
      </div>
      <div id="pw-msg"></div>
      <div class="ebtns">
        <button class="btn-go" onclick="tryEscape()">탈출한다</button>
        <button class="btn-back" onclick="closeEsc()">취소</button>
      </div>
    </div>
  </div>

  <div id="popup-success">
    <div class="success-box">
      <div class="success-emoji">🎉</div>
      <div class="success-title">탈출 성공!</div>
      <div class="success-sub">비밀번호가 맞습니다.<br />탈출 성공!</div>
      <button class="btn-restart" onclick="location.reload()">다시 시작</button>
    </div>
  </div>

  <div id="popup-fire">
    <div class="fire-box">
      <div class="fire-emoji">🔥</div>
      <div class="fire-title">화재 발생!</div>
      <div class="fire-desc">
        쿨러를 꺼버려 서버실에 화재가 발생했습니다.<br />
        시간 내에 쿨러를 켜지 않아 게임이 초기화됩니다.
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="../js/common_inventory.js"></script>
  <script src="../js/common_sound.js"></script>
  <script src="../js/lounge.js"></script>
</body>
</html>
